# ── Gzip compression ─────────────────────────────────────────────────────────
# Dramatically reduces transfer size for text-based assets
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_vary         on;
gzip_proxied      any;
gzip_types
  text/plain
  text/css
  text/javascript
  application/javascript
  application/json
  application/xml
  image/svg+xml
  font/woff2;

server {
    listen 80;
    server_name _;   # ← Replace with your domain, e.g. charleyhullstores.com

    # ── Next.js static assets (hashed filenames → cache forever) ─────────
    location /_next/static/ {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Public static files (images, favicon, etc.) ──────────────────────
    location ~* \.(png|jpg|jpeg|webp|gif|ico|svg|woff2|woff|ttf)$ {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, max-age=2592000";
    }

    # ── Next.js image optimisation endpoint ──────────────────────────────
    location /_next/image {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, max-age=2592000";
        proxy_buffering    on;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # ── API requests → FastAPI backend ────────────────────────────────────
    # Strip /api/proxy prefix added by Next.js server-side relay
    location /api/proxy/ {
        rewrite ^/api/proxy/(.*) /$1 break;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }

    # ── Direct API requests → FastAPI backend ─────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 10M;
    }

    # ── Everything else → Next.js frontend ────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── (Optional) Certbot / Let's Encrypt ────────────────────────────────
    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }
}
