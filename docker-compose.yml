services:
  # ── FastAPI Backend ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: taylormade-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////data/charleyhull.db
      - CHAT_DATA_DIR=/data

  # ── Next.js Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # This gets baked into the JS bundle at build time.
        # Set to empty so fetch("/api/auth/...") goes to same origin,
        # then nginx proxies /api → backend:8000
        NEXT_PUBLIC_API_URL: ""
    container_name: taylormade-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: taylormade-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment after setting up SSL:
      # - ./nginx/certbot/conf:/etc/letsencrypt:ro
      # - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
