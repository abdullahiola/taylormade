version: "3.9"

services:
  backend:
    build: ./backend
    container_name: taylormade_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data          # SQLite database persists here
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:////data/taylormade.db

  # Nginx reverse proxy (optional but recommended)
  nginx:
    image: nginx:alpine
    container_name: taylormade_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro   # SSL certs (optional)
    depends_on:
      - backend

volumes:
  db_data:
